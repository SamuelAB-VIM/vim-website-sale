// ============================================================================
// QUESTIONNAIRE COMPONENT
// ============================================================================

function Questionnaire({ onComplete }) {
  const [answers, setAnswers] = useState({
    aiStance: null,
    bimRole: null,
    pain: [],
    delivery: null,
    currentTools: null,
    scale: null,
    techLevel: null,
  });
  const [step, setStep] = useState(0);

  const questions = [
    {
      key: 'aiStance',
      label: "How do you feel about AI in your workflows?",
      options: [
        { value: 'anti', label: 'Not for us', desc: 'Security or policy concerns' },
        { value: 'neutral', label: 'Open to it', desc: 'Interested but not a priority' },
        { value: 'pro', label: 'Excited', desc: 'Want AI-powered features' },
        { value: 'advanced', label: 'Already using AI', desc: 'Active AI tools in our stack' },
      ],
      multi: false,
    },
    {
      key: 'bimRole',
      label: 'How do you work with BIM models?',
      options: [
        { value: 'designer', label: 'We design them', desc: 'Author models in Revit' },
        { value: 'owner', label: 'We receive them', desc: 'Owner or facility manager' },
        { value: 'contractor', label: 'We build from them', desc: 'Contractor, estimation, scheduling' },
        { value: 'consultant', label: 'We review them', desc: 'Consultant, QA/QC, compliance' },
      ],
      multi: false,
    },
    {
      key: 'pain',
      label: 'What are your biggest BIM challenges? (select all that apply)',
      options: [
        { value: 'estimation', label: 'Cost Estimation' },
        { value: 'scheduling', label: 'Scheduling / 4D' },
        { value: 'audit', label: 'BIM Audit / Quality' },
        { value: 'coordination', label: 'Coordination / Clashes' },
        { value: 'tracking', label: 'Version Tracking' },
        { value: 'carbon', label: 'Carbon / Sustainability' },
        { value: 'reporting', label: 'Reporting / Analytics' },
        { value: 'all', label: 'Show Everything' },
      ],
      multi: true,
    },
    {
      key: 'currentTools',
      label: 'What analytics tools do you use today?',
      options: [
        { value: 'powerbi', label: 'Power BI', desc: 'Already using or licensed' },
        { value: 'excel', label: 'Excel / Spreadsheets', desc: 'Manual reporting' },
        { value: 'interested', label: 'Looking to start', desc: 'Want to adopt analytics' },
        { value: 'none', label: 'Nothing yet', desc: 'No BIM analytics in place' },
      ],
      multi: false,
    },
    {
      key: 'scale',
      label: 'How many BIM models are you working with?',
      options: [
        { value: 'small', label: 'A few projects', desc: 'Under 10 active models' },
        { value: 'medium', label: 'Multiple teams', desc: '10-100 models across projects' },
        { value: '100+', label: 'Portfolio scale', desc: '100+ models, enterprise operations' },
      ],
      multi: false,
    },
  ];

  const q = questions[step];
  const isLast = step === questions.length - 1;
  const canAdvance = q.multi ? answers[q.key].length > 0 : answers[q.key] !== null;

  function select(value) {
    if (q.multi) {
      const arr = answers[q.key];
      if (value === 'all') {
        setAnswers({ ...answers, [q.key]: ['all'] });
      } else {
        const filtered = arr.filter(v => v !== 'all');
        const next = filtered.includes(value) ? filtered.filter(v => v !== value) : [...filtered, value];
        setAnswers({ ...answers, [q.key]: next });
      }
    } else {
      setAnswers({ ...answers, [q.key]: value });
      if (!isLast) setTimeout(() => setStep(step + 1), 200);
    }
  }

  function next() {
    if (isLast) onComplete(answers);
    else setStep(step + 1);
  }

  return h('div', { className: 'min-h-screen flex items-center justify-center p-8' },
    h('div', { className: 'max-w-2xl w-full' },
      h('div', { className: 'text-vim-cyan text-sm font-semibold tracking-widest uppercase mb-2' }, 'VIM'),
      h('div', { className: 'text-slate-500 text-sm mb-8' }, `Let's customize your demo -- ${step + 1} of ${questions.length}`),
      h('h2', { className: 'text-3xl font-bold mb-8' }, q.label),
      h('div', { className: 'grid grid-cols-2 gap-3' },
        q.options.map(opt =>
          h('div', {
            key: opt.value,
            className: `questionnaire-option ${
              q.multi
                ? answers[q.key].includes(opt.value) ? 'selected' : ''
                : answers[q.key] === opt.value ? 'selected' : ''
            }`,
            onClick: () => select(opt.value),
          },
            h('div', { className: 'font-semibold' }, opt.label),
            opt.desc && h('div', { className: 'text-slate-500 text-sm mt-1' }, opt.desc),
          )
        )
      ),
      h('div', { className: 'flex justify-between mt-8' },
        h('button', {
          className: 'btn btn-secondary',
          onClick: () => step > 0 && setStep(step - 1),
          disabled: step === 0,
          style: { opacity: step === 0 ? 0.3 : 1 }
        }, 'Back'),
        h('button', {
          className: `btn ${canAdvance ? 'btn-primary' : 'btn-secondary'}`,
          onClick: next,
          disabled: !canAdvance,
        }, isLast ? 'Build Deck' : 'Next')
      )
    )
  );
}

// ============================================================================
// PRESENTATION COMPONENT
// ============================================================================

function Presentation({ profile, onReset }) {
  const [currentSlide, setCurrentSlide] = useState(0);
  const [drawerOpen, setDrawerOpen] = useState(false);

  // Filter slides based on profile
  const activeSlides = SLIDES.filter(s => {
    if (s.category === 'core') return true;
    if (s.conditions) return s.conditions(profile);
    return false;
  });

  const slide = activeSlides[currentSlide];
  const total = activeSlides.length;

  const goNext = useCallback(() => setCurrentSlide(i => Math.min(i + 1, total - 1)), [total]);
  const goPrev = useCallback(() => setCurrentSlide(i => Math.max(i - 1, 0)), []);

  useEffect(() => {
    function handleKey(e) {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
      if (e.key === 'b') setDrawerOpen(o => !o);
      if (e.key === 'q') onReset();
      if (e.key === 'Escape') setDrawerOpen(false);
    }
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [goNext, goPrev, onReset]);

  // Bullet drawer: all slides NOT in active set
  const bulletSlides = SLIDES.filter(s => !activeSlides.includes(s));

  return h(Fragment, null,
    // Progress bar
    h('div', { className: 'progress-bar', style: { width: `${((currentSlide + 1) / total) * 100}%` } }),

    // Current slide
    h('div', { key: slide.id }, slide.render()),

    // Navigation
    h('div', { className: 'slide-nav' },
      h('button', { className: 'text-slate-400 hover:text-white px-2', onClick: goPrev }, '<'),
      h('span', { className: 'text-sm text-slate-500 min-w-[60px] text-center' }, `${currentSlide + 1} / ${total}`),
      h('button', { className: 'text-slate-400 hover:text-white px-2', onClick: goNext }, '>'),
      h('span', { className: 'text-slate-700 mx-2' }, '|'),
      h('button', { className: 'text-sm text-slate-500 hover:text-vim-cyan', onClick: () => setDrawerOpen(!drawerOpen) }, 'More'),
      h('button', { className: 'text-sm text-slate-500 hover:text-vim-cyan ml-2', onClick: onReset }, 'Reset'),
    ),

    // Bullet drawer
    h('div', { className: `drawer ${drawerOpen ? 'open' : ''}` },
      h('div', { className: 'flex justify-between items-center mb-4' },
        h('h3', { className: 'text-lg font-bold' }, 'Additional Slides'),
        h('button', { className: 'text-slate-400 hover:text-white', onClick: () => setDrawerOpen(false) }, 'X'),
      ),
      h('p', { className: 'text-slate-500 text-xs mb-4' }, 'Click to jump to any slide. These were excluded by your profile.'),
      bulletSlides.map(s =>
        h('button', {
          key: s.id,
          className: 'w-full text-left p-3 rounded-lg hover:bg-slate-800 mb-2 transition-colors',
          onClick: () => {
            // Temporarily add to active and jump
            const idx = SLIDES.indexOf(s);
            setCurrentSlide(activeSlides.length); // Will be off but we insert
            // For now just alert -- proper implementation would inject
            setDrawerOpen(false);
          }
        },
          h('div', { className: 'font-semibold text-sm' }, s.title || s.id),
          h('div', { className: 'text-slate-500 text-xs' }, s.category),
        )
      ),
      h('div', { className: 'mt-6 border-t border-slate-700 pt-4' },
        h('h4', { className: 'text-sm font-bold mb-3' }, 'All Slides'),
        activeSlides.map((s, i) =>
          h('button', {
            key: s.id,
            className: `w-full text-left p-2 rounded text-sm mb-1 ${i === currentSlide ? 'bg-vim-cyan/10 text-vim-cyan' : 'text-slate-400 hover:text-white'}`,
            onClick: () => { setCurrentSlide(i); setDrawerOpen(false); }
          }, `${i + 1}. ${s.title || 'Title'}`)
        )
      )
    ),

    // Click overlay for drawer close
    drawerOpen && h('div', {
      className: 'fixed inset-0 z-40',
      onClick: () => setDrawerOpen(false),
      style: { background: 'rgba(0,0,0,0.3)' }
    }),
  );
}

// APP

function App() {
  const [profile, setProfile] = useState(null);

  if (!profile) {
    return h(Questionnaire, { onComplete: setProfile });
  }

  return h(Presentation, { profile, onReset: () => setProfile(null) });
}

createRoot(document.getElementById('app')).render(h(App));
